name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ سحب الكود من المستودع
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ إعداد Node
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ تثبيت التبعيات
      - name: Install dependencies
        run: npm ci

      # 4️⃣ بناء المشروع
      - name: Build app
        run: npm run build

      # لاحقًا يمكنك إضافة خطوة نشر، مثل Google Cloud Run أو Docker Hub
      # - name: Deploy to Cloud Run
      #   uses: google-github-actions/deploy-cloudrun@v1
      #   with:
      #     service: notely
      #     image: gcr.io/$PROJECT_ID/notely:latest
      #     region: us-central1