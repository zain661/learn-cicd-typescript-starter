name: cd

on:
  push:
    branches: [main]

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      # Authenticate to Google Cloud
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      # Install gcloud and set project
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: notely-489020

      # Build & push image to Artifact Registry
      - name: Build and push image to Artifact Registry
        run: |
          gcloud builds submit \
            --tag us-central1-docker.pkg.dev/notely-489020/notely-ar-repo/notely:latest .

      # Run database migrations
      - name: Run npm run db:migrate
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      # Remove old secret reference (if exists)
      - name: Remove old DATABASE_URL secret reference
        run: |
          gcloud run services update notely \
            --remove-secrets DATABASE_URL \
            --region us-central1 \
            --project notely-489020 || echo "No secret to remove"

      # Deploy to Cloud Run with env vars
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy notely \
            --image us-central1-docker.pkg.dev/notely-489020/notely-ar-repo/notely:latest \
            --region us-central1 \
            --allow-unauthenticated \
            --project notely-489020 \
            --max-instances=4 \
            --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }},TURSO_AUTH_TOKEN=${{ secrets.TURSO_AUTH_TOKEN }}